<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoonSight</title>
    <style>
      @font-face {
        font-family: "Noto Sans";
        src: url("./fonts/NotoSans-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0b0e;
        color: #c8d0e0;
        font-family: system-ui, sans-serif;
      }
      /* Logical 1920×1080 backbuffer; JS letterboxes CSS size (no stretch). */
      #game {
        display: block;
        touch-action: none;
        background: #0a0b0e;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Full-panel while loading/error; compact bar when .running. */
      #status {
        position: fixed;
        inset: 0;
        z-index: 4;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        max-width: none;
        max-height: none;
        overflow: auto;
        font-size: 16px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        text-align: center;
        opacity: 1;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
        background: rgba(10, 12, 18, 0.92);
        color: #c8d0e0;
      }
      #status.running {
        inset: auto;
        left: 12px;
        top: 8px;
        right: 12px;
        display: block;
        max-width: min(720px, 92vw);
        max-height: 70vh;
        font-size: 12px;
        line-height: 1.45;
        text-align: left;
        opacity: 0.55;
        z-index: 2;
        background: rgba(10, 12, 18, 0.72);
        padding: 10px 12px;
        border-radius: 6px;
      }
      #status.error {
        color: #f0c8bc;
        background: rgba(28, 14, 16, 0.94);
      }
      #hint {
        position: fixed;
        right: 12px;
        bottom: 8px;
        font-size: 11px;
        opacity: 0.55;
        pointer-events: none;
        z-index: 2;
        text-align: right;
        text-shadow: 0 1px 2px #000;
      }
    </style>
  </head>
  <body>
    <div id="status" class="panel">loading…</div>
    <div id="hint">
      Enter/Space: advance or confirm choice · ↑↓: choice focus · click row / 1–9: pick<br />
      Esc: menu · A: auto · Ctrl+S save · Ctrl+L load
    </div>
    <canvas id="game" width="1920" height="1080"></canvas>
    <script type="module" src="./boot.js"></script>
  </body>
</html>
