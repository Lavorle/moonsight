name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-tooling:
    name: Release evidence tooling tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test benchmark, reproducibility, RC, and evidence validators
        run: python3 -m unittest discover -s scripts -p 'test_*.py'

  moon:
    name: MoonBit format / check / test / wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Toolchain version
        run: moon version

      - name: Format
        run: moon fmt --check

      - name: Check all targets
        run: moon check --target all

      - name: Test
        run: moon test

      - name: Build release WebAssembly
        run: moon build --target wasm-gc --release host_web

      - name: Upload release WebAssembly
        uses: actions/upload-artifact@v4
        with:
          name: host-web-wasm
          path: _build/wasm-gc/release/build/host_web/host_web.wasm
          if-no-files-found: error

  host:
    name: Web host test / typecheck / build
    runs-on: ubuntu-latest
    needs: moon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/host-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/host-web
        run: npm ci

      - name: Download release WebAssembly
        uses: actions/download-artifact@v4
        with:
          name: host-web-wasm
          path: apps/host-web/public

      - name: Test, including production-content rejection
        working-directory: apps/host-web
        run: npm test

      - name: Typecheck
        working-directory: apps/host-web
        run: npx tsc --noEmit

      - name: Build production host
        working-directory: apps/host-web
        run: npm run build

      - name: Upload host distribution
        uses: actions/upload-artifact@v4
        with:
          name: host-web-dist
          path: apps/host-web/dist
          if-no-files-found: error

  cli-fixtures:
    name: CLI fixtures / packaged demo
    runs-on: ubuntu-latest
    needs: [moon, host]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install native compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Download host distribution
        uses: actions/download-artifact@v4
        with:
          name: host-web-dist
          path: apps/host-web/dist

      - name: CLI version and demo check
        env:
          CC: gcc
        run: |
          moon run cmd/moonsightc --target native -- version
          moon run cmd/moonsightc --target native -- check demo/game

      - name: New project check and build
        env:
          CC: gcc
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          moon run cmd/moonsightc --target native -- new ci-game -o "$tmp"
          moon run cmd/moonsightc --target native -- check "$tmp/ci-game"
          moon run cmd/moonsightc --target native -- build "$tmp/ci-game" -o "$tmp/new-dist"
          test -s "$tmp/new-dist/index.html"
          test -s "$tmp/new-dist/game.msb"

      - name: Build demo package
        env:
          CC: gcc
        run: moon run cmd/moonsightc --target native -- build demo/game -o dist/demo

      - name: Missing host distribution fails clearly
        env:
          CC: gcc
        run: |
          mv apps/host-web/dist apps/host-web/dist.saved
          trap 'mv apps/host-web/dist.saved apps/host-web/dist' EXIT
          if moon run cmd/moonsightc --target native -- build demo/game -o /tmp/should-not-build > /tmp/missing-host.log 2>&1; then
            cat /tmp/missing-host.log
            echo "build unexpectedly succeeded without apps/host-web/dist" >&2
            exit 1
          fi
          cat /tmp/missing-host.log
          grep -F "npm run build" /tmp/missing-host.log

      - name: Upload packaged demo
        uses: actions/upload-artifact@v4
        with:
          name: packaged-demo
          path: dist/demo
          if-no-files-found: error

  package-smoke:
    name: Packaged distribution smoke
    runs-on: ubuntu-latest
    needs: cli-fixtures
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged demo
        uses: actions/download-artifact@v4
        with:
          name: packaged-demo
          path: dist/demo

      - name: Verify required assets and MSB header
        run: ./scripts/verify-package.sh dist/demo

      - name: Reject missing, empty, and corrupt MSB fixtures
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          cp -a dist/demo "$tmp/missing"
          rm "$tmp/missing/game.msb"
          if ./scripts/verify-package.sh "$tmp/missing"; then
            echo "package smoke accepted a missing game.msb" >&2
            exit 1
          fi

          cp -a dist/demo "$tmp/empty"
          : > "$tmp/empty/game.msb"
          if ./scripts/verify-package.sh "$tmp/empty"; then
            echo "package smoke accepted an empty game.msb" >&2
            exit 1
          fi

          cp -a dist/demo "$tmp/corrupt"
          printf 'BAD!' > "$tmp/corrupt/game.msb"
          if ./scripts/verify-package.sh "$tmp/corrupt"; then
            echo "package smoke accepted a corrupt game.msb" >&2
            exit 1
          fi

  docs:
    name: Documentation typecheck / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/docs-site/package-lock.json

      - name: Install dependencies
        working-directory: apps/docs-site
        run: npm ci

      - name: Typecheck
        working-directory: apps/docs-site
        run: npm run types:check

      - name: Build
        working-directory: apps/docs-site
        run: npm run build

  desktop:
    name: Desktop Rust format / check / test
    runs-on: ubuntu-22.04
    needs: package-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged demo
        uses: actions/download-artifact@v4
        with:
          name: packaged-demo
          path: dist/demo

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Cargo format
        working-directory: host_desktop/tauri/src-tauri
        run: cargo fmt --all -- --check

      - name: Cargo check
        working-directory: host_desktop/tauri/src-tauri
        run: cargo check --locked

      - name: Cargo test
        working-directory: host_desktop/tauri/src-tauri
        run: cargo test --locked
